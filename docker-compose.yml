version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: studious-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  auth-service:
    container_name: studious-auth-service
    restart: unless-stopped
    build:
      context: ./services/authorization-service
      dockerfile: src/Presentation/AuthService.GrpcApi/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      DatabaseOptions__ConnectionString: "Host=postgres;Port=5432;Database=labdb;Username=rising_legend;Password=111111"
      JwtOptions__SecretKey: ${JWT_SECRET_KEY}
      JwtOptions__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
      JwtOptions__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS}
      JwtOptions__Issuer: ${JWT_ISSUER}
      JwtOptions__Audience: ${JWT_AUDIENCE}
    depends_on:
      - postgres
    expose:
      - "8080"
    networks:
      - app-network

  voice-service:
    container_name: studious-voice-service
    restart: unless-stopped
    build:
      context: ./services/voice-service
      dockerfile: src/VoiceService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    expose:
      - "8080"
    networks:
      - app-network

  gateway:
    container_name: studious-gateway
    restart: unless-stopped
    build:
      context: ./gateway
      dockerfile: src/Gateway.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      GrpcOptions__AuthServiceUrl: http://auth-service:8080
      ReverseProxy__Clusters__voice-cluster__Destinations__voice-service__Address: http://voice-service:8080/
    depends_on:
      - auth-service
      - voice-service
    expose:
      - "8080"
    networks:
      - app-network

  frontend:
    container_name: studious-frontend
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: studious-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - gateway
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network

  coturn:
    image: coturn/coturn:4.6.2
    container_name: studious-coturn
    restart: unless-stopped
    command: >
      -n
      --log-file=stdout
      --realm=${TURN_REALM}
      --lt-cred-mech
      --user=${TURN_USERNAME}:${TURN_PASSWORD}
      --no-cli
      --no-tls
      --no-dtls
      --listening-port=${TURN_PORT}
    ports:
      - "${TURN_PORT}:3478"
      - "${TURN_PORT}:3478/udp"
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge