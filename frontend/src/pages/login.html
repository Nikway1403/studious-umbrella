<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход / Регистрация</title>
    <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="page auth-page">
    <header class="header">
        <a href="./index.html" class="logo">Voice App</a>

        <nav class="nav">
            <a class="btn btn-ghost" href="./index.html">Главная</a>
            <a class="btn btn-primary" href="./room.html">Переговорная</a>
        </nav>
    </header>

    <main class="auth-layout">
        <section class="auth-side fade-up">
            <div class="glass-card auth-side-card">
                <div class="hero-badge">Добро пожаловать</div>
                <h1>Войди или создай аккаунт</h1>
                <p class="hero-text">
                    После входа ты сможешь перейти в переговорную и начать общение.
                </p>
            </div>
        </section>

        <section class="auth-main fade-up delay-1">
            <div class="glass-card auth-card">
                <div class="tabs auth-tabs">
                    <button id="loginTab" class="btn btn-primary" type="button">Вход</button>
                    <button id="registerTab" class="btn btn-ghost" type="button">Регистрация</button>
                </div>

                <form id="authForm" class="form auth-form">
                    <label class="field">
                        <span class="field-label">Nickname</span>
                        <input
                                id="nickname"
                                type="text"
                                placeholder="Введите nickname"
                                autocomplete="username"
                                required
                        />
                    </label>

                    <label class="field">
                        <span class="field-label">Пароль</span>
                        <input
                                id="password"
                                type="password"
                                placeholder="Введите пароль"
                                autocomplete="current-password"
                                required
                        />
                    </label>

                    <button class="btn btn-primary btn-lg auth-submit" type="submit">
                        Продолжить
                    </button>
                </form>

                <p id="status" class="status"></p>
            </div>
        </section>
    </main>
</div>

<script type="module" src="../js/login.js"></script>
</body>
</html>
