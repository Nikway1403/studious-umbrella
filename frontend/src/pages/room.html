<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Переговорная</title>
    <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="page room-page">
    <header class="header">
        <a href="./index.html" class="logo">Voice App</a>

        <nav class="nav">
            <a class="btn btn-ghost" href="./index.html">Главная</a>
            <button id="logoutBtn" class="btn btn-primary" type="button">Выйти</button>
        </nav>
    </header>

    <section class="glass-card room-top fade-up">
        <div class="room-top-row room-top-row-stack">
            <div class="room-title-block">
                <h1>Переговорная</h1>
                <p class="subtitle">Создай комнату или подключись по коду</p>
            </div>

            <div class="room-actions-top">
                <button id="createRoomBtn" class="btn btn-primary" type="button">Создать комнату</button>
            </div>
        </div>

        <div class="room-join-row">
            <input
                    id="roomId"
                    type="text"
                    placeholder="Код комнаты"
                    autocomplete="off"
            />
            <button id="joinRoomBtn" class="btn btn-ghost" type="button">Войти</button>
        </div>

        <div class="room-meta">
            <p id="roomInfo" class="subtitle">Комната ещё не создана</p>
            <p id="callStatus" class="status room-status">Статус: ожидание</p>
        </div>
    </section>

    <main class="room-layout fade-up delay-1">
        <section class="glass-card video-section">
            <div class="section-title">
                <h2>Звонок</h2>
            </div>

            <div class="videos">
                <div class="video-card">
                    <span class="video-label">Моё видео</span>
                    <video id="localVideo" autoplay playsinline muted></video>
                </div>

                <div class="video-card">
                    <span class="video-label">Собеседник</span>
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>
            </div>

            <div class="actions room-actions">
                <button id="enableMicBtn" class="btn btn-primary" type="button">Микрофон</button>
                <button id="enableCameraBtn" class="btn btn-ghost" type="button">Камера</button>
                <button id="toggleMuteBtn" class="btn btn-ghost" type="button">Mute</button>
                <button id="toggleCameraBtn" class="btn btn-ghost" type="button">Cam Off</button>
                <button id="shareScreenBtn" class="btn btn-ghost" type="button">Экран</button>
                <button id="hangupBtn" class="btn btn-danger" type="button">Завершить</button>
            </div>
        </section>

        <aside class="glass-card chat-section">
            <div class="section-title">
                <h2>Чат</h2>
            </div>

            <div id="messages" class="messages"></div>

            <div class="chat-input-row">
                <input
                        id="messageInput"
                        type="text"
                        placeholder="Введите сообщение"
                        autocomplete="off"
                />
                <button id="sendMessageBtn" class="btn btn-primary" type="button">Отправить</button>
            </div>
        </aside>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
<script type="module" src="../js/room.js"></script>
</body>
</html>
